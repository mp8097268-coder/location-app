<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body>
<h3>Login System 🔐</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>
<canvas id="myChart"></canvas>

<h2>Expense Tracker 💰</h2>

<!-- Inputs -->
<input type="text" id="title" placeholder="Kis cheez ka expense (e.g. Food)">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<button type="button" onclick="addExpense()">Add</button>
<button onclick="logout()">Logout</button>

<hr>

<!-- Filter -->
<input type="date" id="filterDate">
<button onclick="filterByDate()">Search by Date</button>

<br><br>

<!-- Filter by range -->
<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="filterByRange()">Filter Range</button>

<br><br>

<button onclick="resetData()">Show All</button>

<h3>Total: ₹<span id="total">0</span></h3>

<ul id="list"></ul>

<script src="script.js"></script>

</body>
</html>
